<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ site.baseurl }}/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.baseurl }}/feed.xml">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
      <p class="site-desc">{{ site.description }}</p>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>{{ site.title }} &copy; {{ site.time | date: "%Y" }} &middot; <a href="{{ site.baseurl }}/feed.xml">RSS</a></p>
    </div>
  </footer>
</body>
</html>
