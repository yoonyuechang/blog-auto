<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ site.baseurl }}/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.baseurl }}/feed.xml">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📡</text></svg>">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
      <div class="header-meta">
        <span>{{ site.description }}</span>
        <span class="badge">daily</span>
        <a href="{{ site.baseurl }}/feed.xml">RSS</a>
      </div>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p><a href="{{ site.baseurl }}/">{{ site.title }}</a> &middot; {{ "now" | date: "%Y" }} &middot; <a href="https://github.com/yoonyuechang/blog-auto">GitHub</a></p>
    </div>
  </footer>
</body>
</html>
