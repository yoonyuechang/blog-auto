title: Dev & AI Digest
description: AI와 개발, 오픈소스 소식을 매일 전합니다
url: https://yoonyuechang.github.io
baseurl: /blog-auto
markdown: kramdown
permalink: /:year/:month/:day/:title/
show_excerpts: false
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      image: ""
