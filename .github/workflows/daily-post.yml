name: Daily Blog Post

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  models: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate post
        run: python scripts/generate_post.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Tistory
        run: python scripts/publish_tistory.py
        env:
          TISTORY_BLOG: ${{ secrets.TISTORY_BLOG }}
          TISTORY_COOKIE: ${{ secrets.TISTORY_COOKIE }}
