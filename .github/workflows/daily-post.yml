name: Daily Blog Post

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_post.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily blog post [skip ci]"
          commit_user_name: "blog-bot"
          commit_user_email: "blog-bot@users.noreply.github.com"
